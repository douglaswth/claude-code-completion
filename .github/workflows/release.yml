name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload completion scripts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" claude.bash claude.ps1
