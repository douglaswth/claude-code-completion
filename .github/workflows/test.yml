name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install modern bash (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Verify bash version
        run: |
          which bash
          bash --version | head -1

      - name: Install bashunit
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash

      - name: Run tests
        run: ./lib/bashunit tests/

      - name: Run tests with coverage
        run: ./lib/bashunit tests/ --coverage --coverage-paths claude.bash

  powershell:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/powershell/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

  powershell-5:
    name: powershell (windows-latest, 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run tests
        shell: powershell
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/powershell/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
