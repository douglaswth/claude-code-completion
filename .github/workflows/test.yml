name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install modern bash (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Verify bash version
        run: |
          which bash
          bash --version | head -1

      - name: Install bashunit
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash

      - name: Run tests
        run: ./lib/bashunit tests/bash/

      - name: Run tests with coverage
        run: ./lib/bashunit tests/bash/ --coverage --coverage-paths claude.bash

  powershell:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shell: [pwsh]
        include:
          - os: windows-latest
            shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          & ${{ matrix.shell }} -Command 'Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck'

      - name: Run tests
        shell: pwsh
        run: |
          & ${{ matrix.shell }} -ExecutionPolicy Bypass -File tests/powershell/Invoke-Tests.ps1

      - name: Run tests with coverage
        shell: pwsh
        run: |
          & ${{ matrix.shell }} -ExecutionPolicy Bypass -File tests/powershell/Invoke-Tests.ps1 -Coverage
